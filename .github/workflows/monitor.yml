name: Monitor Semeru

permissions:
  contents: write

on:

  schedule:

    # monitor kuota
    - cron: '*/10 * * * *'

    # heartbeat jam 08:00 WIB
    - cron: '0 1 * * *'

  workflow_dispatch:

jobs:

  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run Monitor
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WA_NUMBER: ${{ secrets.WA_NUMBER }}
          MONITOR_MONTH: ${{ secrets.MONITOR_MONTH }}
          EVENT_NAME: ${{ github.event.schedule }}
        run: php monitor.php

      - name: Commit Status
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add status.json

          git diff --cached --quiet || git commit -m "update status"

          git push
